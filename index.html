<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini CRM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div>
                <h1>Mini CRM</h1>
            <p>Manage clients in a simple and organized way.</p>
            </div>
        </header>
    
        <section class="form-section">
            <h2>Add Client</h2>

            <form id="clientForm">
                <input type="hidden" id="clientId" />

                <div class="grid">
                    <input type="text" id="name" placeholder="Client name" required />
                    <input type="email" id="email" placeholder="Client email" required />
                    <input type="tel" id="phone" placeholder="Phone number" required />
                    <input type="text" id="company" placeholder="Company name" required />

                    <select id="status" required>
                        <option value="">Select status</option>
                        <option value="Lead">Lead</option>
                        <option value="Contacted">Contacted</option>
                        <option value="Proposal">Proposal</option>
                        <option value="Closed">Closed</option>
                    </select>
                </div>

                <textarea id="notes" placeholder="Notes" rows="4"></textarea>

                <div class="actions">
                    <button type="submit" id="submitButton">Save Client</button>
                    <button type="button" id="cancelEditButton" class="secondary">Cancel Edit</button>
                </div>

                <p id="message"></p>
            </form>
        </section>

        <section class="list-section">
            <div class="list-header">
                <h2>Clients</h2>
                <input type="text" id="searchInput" placeholder="Search by name" />
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Company</th>
                            <th>Status</th>
                            <th>Notes</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="clientsTableBody"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
